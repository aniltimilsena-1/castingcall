<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>CaastingCall | Find Casting Calls, Auditions & Actor Jobs</title>
  <meta name="description"
    content="CaastingCall is the premier platform to find casting calls, actor auditions, and film industry jobs. Connect with top directors, singers, and talent worldwide." />
  <meta name="keywords" content="casting call, actor auditions, acting jobs, film industry, talent network, caastingcall, find actors" />
  <meta name="author" content="CaastingCall" />

  <!-- Open Graph / Facebook -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta property="og:title" content="CaastingCall | Find Your Next Star" />
  <meta property="og:description" content="Connect with top talent and find exclusive casting opportunities on CaastingCall." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://caastingcall.me" />
  <meta property="og:image" content="/logo.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CaastingCall | Find Your Next Star" />
  <meta name="twitter:description" content="Find actor auditions and casting opportunities worldwide." />
  <meta name="twitter:site" content="@CaastingCall" />
  <meta name="twitter:image" content="/logo.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CaastingCall",
      "url": "https://caastingcall.me/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://caastingcall.me/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "description": "Find casting calls, auditions, and acting jobs on the premier talent network."
    }
  </script>
</head>
